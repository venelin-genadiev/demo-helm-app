apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.name | quote }}
spec:
  acme:
    server: {{ .Values.acmeServer | quote }}
    email: {{ .Values.email | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.name | quote }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.secretName | quote }}
              key: {{ .Values.secretKey | quote }}
