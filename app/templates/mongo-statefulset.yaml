apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: death-metal
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: mongodb
  serviceName: mongodb
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: death-metal
        app.kubernetes.io/component: database
        app.kubernetes.io/instance: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:8.3.2
        envFrom:
        - secretRef:
            name: mongo-secret
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
