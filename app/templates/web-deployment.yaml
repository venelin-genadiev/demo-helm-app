apiVersion: apps/v1
kind: Deployment
metadata:
  name: death-metal-web
  namespace: death-metal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: death-metal-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: death-metal
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: death-metal-web
    spec:
      containers:
      - name: death-metal-web
        image: death-metal-web:local
        resources:
          requests:
            memory: "128Mi"
            cpu: "200m"
          limits:
            memory: "128Mi"
        ports:
        - containerPort: 80