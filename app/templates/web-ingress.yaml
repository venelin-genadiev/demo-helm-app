apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: death-metal-web-ingress
  namespace: {{ .Release.Namespace }}
  {{- if .Values.ingress.tls.enabled }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - pathType: Prefix
        path: /death-metal-groups
        backend:
          service:
            name: death-metal-api-service
            port:
              number: 3005
      - pathType: Prefix
        path: /
        backend:
          service:
            name: death-metal-web-service
            port:
              number: 8080
